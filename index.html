<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B1F2E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>위버멘쉬 — 매일의 극복</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #1B1F2E;
    color: #EDE7D9;
    font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .sans { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  svg text { font-family: Georgia, serif; }

  .stage-badge {
    display: flex; align-items: center; gap: 10px;
    background: #242B3D; border: 1px solid #3A4256; border-radius: 12px;
    padding: 12px 14px; margin: 1rem 0;
  }
  .stage-badge .label { font-size: 12px; color: #8B92A8; margin: 0 0 2px; }
  .stage-badge .name { font-size: 16px; color: #C9A54A; margin: 0; font-weight: 700; }
  .stage-desc {
    font-size: 13px; color: #8B92A8; line-height: 1.7; margin: 0.4rem 0 1.4rem;
    font-family: Georgia, serif; font-style: italic;
  }
  .quote {
    font-size: 14px; font-style: italic; text-align: center; line-height: 1.8;
    color: #8B92A8; margin: 1.1rem 0 1.4rem;
  }
  .stats { display: flex; gap: 12px; margin-bottom: 1.4rem; }
  .stat {
    flex: 1; background: #242B3D; border: 1px solid #3A4256; border-radius: 10px;
    padding: 12px 14px;
  }
  .stat p.l { font-size: 12px; color: #8B92A8; margin: 0 0 4px; }
  .stat p.v { font-size: 20px; font-weight: 700; margin: 0; color: #EDE7D9; display: flex; align-items: center; gap: 4px; }

  .addrow { display: flex; gap: 8px; margin-bottom: 1rem; }
  .addrow input {
    flex: 1; background: #242B3D; border: 1px solid #3A4256; border-radius: 8px;
    padding: 10px 12px; color: #EDE7D9; font-size: 14px;
  }
  .addrow input::placeholder { color: #6b7286; }
  .addrow button, .task .del {
    background: #C9A54A; border: none; border-radius: 8px; padding: 0 16px;
    color: #1B1F2E; font-weight: 700; cursor: pointer; display: flex; align-items: center;
  }
  .task .del { background: none; color: #8B92A8; padding: 0; }

  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task {
    display: flex; align-items: center; gap: 10px; background: #242B3D;
    border: 1px solid #3A4256; border-radius: 10px; padding: 10px 12px;
  }
  .task.done { border-color: #7A9471; }
  .task .chk {
    width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid #8B92A8;
    background: transparent; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; padding: 0;
  }
  .task.done .chk { background: #7A9471; border-color: #7A9471; }
  .task .name { flex: 1; font-size: 15px; color: #EDE7D9; }
  .task.done .name { color: #8B92A8; text-decoration: line-through; }

  .empty {
    text-align: center; padding: 2rem 1rem; color: #8B92A8; font-size: 14px;
  }

  .heat-label { font-size: 12px; color: #8B92A8; margin: 1.8rem 0 8px; letter-spacing: 0.3px; }
  .heat { display: flex; gap: 4px; }
  .heat div { flex: 1; height: 28px; border-radius: 4px; border: 1px solid #3A4256; background: #242B3D; }

  .footer {
    margin-top: 2.2rem; padding-top: 1.2rem; border-top: 1px solid #3A4256;
    font-size: 12px; color: #6b7286; line-height: 1.8;
  }
</style>
</head>
<body>
<div class="wrap">

  <svg viewBox="0 0 400 150" style="width:100%; display:block;">
    <defs><clipPath id="skyClip"><rect x="0" y="0" width="400" height="150"/></clipPath></defs>
    <g clip-path="url(#skyClip)">
      <circle id="sun" cx="200" cy="108" r="22" fill="#C9A54A" opacity="0.9"/>
      <polygon points="0,150 60,60 110,110 160,40 210,105 260,55 310,115 360,70 400,150" fill="#242B3D" stroke="#3A4256"/>
      <polygon points="0,150 90,90 150,130 220,75 300,125 400,150" fill="#1B1F2E"/>
    </g>
    <text x="200" y="140" text-anchor="middle" fill="#EDE7D9" font-size="16" letter-spacing="2">위버멘쉬 — 매일의 극복</text>
  </svg>

  <div class="stage-badge">
    <div>
      <p class="label sans">지금의 단계 — 차라투스트라의 세 가지 변화 중</p>
      <p class="name" id="stageName">낙타</p>
    </div>
  </div>
  <p class="stage-desc" id="stageDesc"></p>

  <p class="quote" id="quote"></p>

  <div class="stats">
    <div class="stat"><p class="l sans">오늘의 극복</p><p class="v sans" id="todayCount">0 / 0</p></div>
    <div class="stat"><p class="l sans">연속 정복일</p><p class="v sans" id="streakCount">0</p></div>
  </div>

  <div class="addrow">
    <input id="taskInput" class="sans" placeholder="오늘 넘어서야 할 과제를 적으세요" />
    <button class="sans" onclick="addTask()">+</button>
  </div>

  <div id="taskList" class="task-list"></div>
  <div id="emptyState" class="empty sans" style="display:none;">아직 과제가 없습니다. 오늘 스스로 넘어설 첫 번째 산을 정하세요.</div>

  <p class="heat-label sans">지난 14일간의 등정</p>
  <div class="heat" id="heat"></div>

  <button class="sans" id="reportBtn" onclick="showReport()" style="width:100%; margin-top:1.5rem; background:#242B3D; border:1px solid #3A4256; color:#C9A54A; border-radius:10px; padding:12px; font-size:14px; font-weight:700; cursor:pointer;">이번 달 결산 보기</button>

  <div id="reportModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10; align-items:center; justify-content:center; padding:1.2rem;">
    <div style="background:#1B1F2E; border:1px solid #3A4256; border-radius:14px; padding:1.5rem 1.3rem; max-width:420px; width:100%; max-height:85vh; overflow-y:auto;">
      <div id="reportContent"></div>
      <button class="sans" onclick="closeReport()" style="width:100%; margin-top:1rem; background:#C9A54A; border:none; border-radius:8px; padding:10px; font-weight:700; color:#1B1F2E; cursor:pointer;">닫기</button>
    </div>
  </div>

  <div id="dayModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10; align-items:center; justify-content:center; padding:1.2rem;">
    <div style="background:#1B1F2E; border:1px solid #3A4256; border-radius:14px; padding:1.5rem 1.3rem; max-width:420px; width:100%; max-height:85vh; overflow-y:auto;">
      <div id="dayContent"></div>
      <button class="sans" onclick="closeDay()" style="width:100%; margin-top:1rem; background:#C9A54A; border:none; border-radius:8px; padding:10px; font-weight:700; color:#1B1F2E; cursor:pointer;">닫기</button>
    </div>
  </div>

  <div class="footer sans">
    이 페이지는 브라우저에만 저장되며 인터넷 연결이 필요 없습니다.<br>
    아이폰: 공유 버튼 → "홈 화면에 추가" · 안드로이드: 메뉴 → "홈 화면에 추가"를 누르면 앱처럼 쓸 수 있습니다.
  </div>

</div>

<script>
const STORAGE_KEY = "uebermensch_state_v1";

const QUOTES = [
  "인간은 극복되어야 할 무엇이다 — 짐승과 위버멘쉬를 잇는 밧줄 위의 존재.",
  "너 자신을 넘어서지 못하는 자는 결코 위로 오르지 못한다.",
  "창조하는 자가 되려거든, 먼저 파괴하는 자가 되어야 한다.",
  "산에 오르는 가장 가파른 길이야말로 가장 짧은 길이다.",
  "몰락하는 자만이 저편으로 건너간다.",
  "자기 자신의 주인이 되지 못한 자는 명령할 자격이 없다.",
  "위대한 정오 — 인간이 짐승과 위버멘쉬의 한가운데서 자신의 길을 가장 또렷이 보는 시각.",
  "벗에게서 최선의 적을 발견하라, 그의 저항이 너를 더 높이 세운다."
];

const STAGES = [
  {
    name: "낙타",
    threshold: 0,
    desc: "정신은 짐을 진 낙타가 되어 사막으로 나아간다. '너는 해야 한다'는 말 아래, 가장 무거운 것들을 스스로 짊어짐으로써 비로소 강해진다."
  },
  {
    name: "사자",
    threshold: 7,
    desc: "사막에서 낙타는 사자가 된다. 사자는 '너는 해야 한다'라는 거대한 용에 맞서 '나는 원한다'라고 외치며 자유를 쟁취한다."
  },
  {
    name: "어린아이",
    threshold: 30,
    desc: "마침내 사자는 어린아이가 된다. 아이는 순진무구함이며, 망각이며, 새로운 시작이며, 스스로 도는 바퀴이며, 성스러운 긍정이다."
  }
];

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

const DEFAULT_HABITS = [
  "아침에 일어나자마자 이불을 정리하라",
  "차가운 물로 얼굴과 몸을 깨워라",
  "잠깐이라도 조용한 곳에 혼자 있어라",
  "오늘 해야 할 일을 손으로 적어라",
  "음식을 먹을 때는 음식만 먹어라",
  "매일 몇 장이라도 책을 읽어라",
  "붙잡고 있던 물건을 정리하라",
  "한 가지 일에 오래 집중하라",
  "몸을 자주 움직여라"
];

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    tasks: DEFAULT_HABITS.map(name => ({ id: crypto.randomUUID(), name })),
    completions: {}
  };
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
const today = todayStr();

function pickQuote(seed) {
  let sum = 0;
  for (let i = 0; i < seed.length; i++) sum += seed.charCodeAt(i);
  return QUOTES[sum % QUOTES.length];
}

function isFull(dateStr) {
  const done = new Set(state.completions[dateStr] || []);
  return state.tasks.length > 0 && state.tasks.every(t => done.has(t.id));
}

function computeStreak() {
  if (state.tasks.length === 0) return 0;
  let count = 0;
  let cursor = new Date();
  if (!isFull(today)) cursor.setDate(cursor.getDate() - 1);
  for (let i = 0; i < 3650; i++) {
    const dStr = cursor.toISOString().slice(0, 10);
    if (isFull(dStr)) { count++; cursor.setDate(cursor.getDate() - 1); }
    else break;
  }
  return count;
}

function currentStage(streak) {
  let stage = STAGES[0];
  for (const s of STAGES) if (streak >= s.threshold) stage = s;
  return stage;
}

function addTask() {
  const input = document.getElementById("taskInput");
  const name = input.value.trim();
  if (!name) return;
  state.tasks.push({ id: crypto.randomUUID(), name });
  input.value = "";
  saveState(state);
  render();
}

function removeTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState(state);
  render();
}

function toggleToday(id) {
  const set = new Set(state.completions[today] || []);
  if (set.has(id)) set.delete(id); else set.add(id);
  state.completions[today] = Array.from(set);
  saveState(state);
  render();
}

function render() {
  const doneToday = new Set(state.completions[today] || []);
  const streak = computeStreak();
  const stage = currentStage(streak);

  document.getElementById("stageName").textContent = stage.name;
  document.getElementById("stageDesc").textContent = stage.desc;
  document.getElementById("quote").textContent = pickQuote(today);
  document.getElementById("todayCount").textContent = `${doneToday.size} / ${state.tasks.length}`;
  document.getElementById("streakCount").textContent = streak;

  const sunTopY = 40, sunBottomY = 108;
  const progress = state.tasks.length === 0 ? 0 : doneToday.size / state.tasks.length;
  document.getElementById("sun").setAttribute("cy", sunBottomY - progress * (sunBottomY - sunTopY));

  const listEl = document.getElementById("taskList");
  const emptyEl = document.getElementById("emptyState");
  listEl.innerHTML = "";
  emptyEl.style.display = state.tasks.length === 0 ? "block" : "none";

  state.tasks.forEach(t => {
    const done = doneToday.has(t.id);
    const row = document.createElement("div");
    row.className = "task" + (done ? " done" : "");
    row.innerHTML = `
      <button class="chk" aria-label="완료 표시" onclick="toggleToday('${t.id}')">${done ? "&#10003;" : ""}</button>
      <span class="name">${t.name.replace(/</g, "&lt;")}</span>
      <button class="del sans" aria-label="삭제" onclick="removeTask('${t.id}')">&times;</button>
    `;
    listEl.appendChild(row);
  });

  const heatEl = document.getElementById("heat");
  heatEl.innerHTML = "";
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dStr = d.toISOString().slice(0, 10);
    const set = new Set(state.completions[dStr] || []);
    const ratio = state.tasks.length === 0 ? 0 : set.size / state.tasks.length;
    const cell = document.createElement("div");
    cell.title = dStr;
    cell.style.cursor = "pointer";
    cell.onclick = () => showDay(dStr);
    if (ratio >= 1) cell.style.background = "#7A9471";
    else if (ratio > 0) cell.style.background = "#8A7239";
    if (dStr === today) cell.style.borderColor = "#C9A54A";
    heatEl.appendChild(cell);
  }
}

document.getElementById("taskInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

function showDay(dateStr) {
  const set = new Set(state.completions[dateStr] || []);
  const isToday = dateStr === today;
  let rows = state.tasks.map(t => {
    const done = set.has(t.id);
    return `<div style="display:flex; align-items:center; gap:8px; padding:6px 0; color:${done ? '#EDE7D9' : '#6b7286'};">
      <span style="width:18px;">${done ? '&#10003;' : '&middot;'}</span>
      <span style="${done ? '' : 'text-decoration:line-through;'}">${t.name.replace(/</g, "&lt;")}</span>
    </div>`;
  }).join("");
  if (state.tasks.length === 0) rows = `<p style="color:#8B92A8;">과제가 없습니다.</p>`;
  document.getElementById("dayContent").innerHTML = `
    <p class="sans" style="color:#C9A54A; font-weight:700; font-size:16px; margin:0 0 4px;">${dateStr}${isToday ? " (오늘)" : ""}</p>
    <p class="sans" style="color:#8B92A8; font-size:13px; margin:0 0 12px;">${set.size} / ${state.tasks.length} 완료</p>
    <div class="sans" style="font-size:14px;">${rows}</div>
  `;
  document.getElementById("dayModal").style.display = "flex";
}
function closeDay() { document.getElementById("dayModal").style.display = "none"; }

function showReport() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  let conqueredDays = 0;
  let bestStreakInMonth = 0, currentRun = 0;
  const perHabit = {};
  state.tasks.forEach(t => perHabit[t.id] = { name: t.name, done: 0, total: 0 });

  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(y, m, d);
    if (dt > now) break;
    const dStr = dt.toISOString().slice(0, 10);
    const set = new Set(state.completions[dStr] || []);
    state.tasks.forEach(t => {
      perHabit[t.id].total++;
      if (set.has(t.id)) perHabit[t.id].done++;
    });
    const full = state.tasks.length > 0 && state.tasks.every(t => set.has(t.id));
    if (full) {
      conqueredDays++;
      currentRun++;
      bestStreakInMonth = Math.max(bestStreakInMonth, currentRun);
    } else {
      currentRun = 0;
    }
  }

  const habitRows = Object.values(perHabit).map(h => {
    const pct = h.total === 0 ? 0 : Math.round((h.done / h.total) * 100);
    return `<div style="margin-bottom:10px;">
      <div class="sans" style="display:flex; justify-content:space-between; font-size:13px; color:#EDE7D9; margin-bottom:4px;">
        <span>${h.name.replace(/</g, "&lt;")}</span><span style="color:#8B92A8;">${pct}%</span>
      </div>
      <div style="background:#3A4256; border-radius:6px; height:8px; overflow:hidden;">
        <div style="width:${pct}%; height:100%; background:#C9A54A;"></div>
      </div>
    </div>`;
  }).join("");

  const overallPct = now.getDate() === 0 ? 0 : Math.round((conqueredDays / now.getDate()) * 100);
  let verdict;
  if (overallPct >= 80) verdict = "이번 달, 당신은 사자처럼 싸웠습니다. '나는 원한다'는 외침이 삶이 되었습니다.";
  else if (overallPct >= 40) verdict = "낙타와 사자 사이, 짐을 견디며 조금씩 스스로의 길을 찾아가는 중입니다.";
  else verdict = "아직 짐을 짊어지는 낙타의 시간입니다. 매일의 반복이 결국 힘이 됩니다.";

  document.getElementById("reportContent").innerHTML = `
    <p class="sans" style="color:#C9A54A; font-weight:700; font-size:17px; margin:0 0 12px;">${y}년 ${m + 1}월 결산</p>
    <div class="stats" style="margin-bottom:1.2rem;">
      <div class="stat"><p class="l sans">완전 정복일</p><p class="v sans">${conqueredDays}일</p></div>
      <div class="stat"><p class="l sans">이번 달 최장 연속</p><p class="v sans">${bestStreakInMonth}일</p></div>
    </div>
    <p class="sans" style="font-size:12px; color:#8B92A8; margin:0 0 10px;">습관별 완료율</p>
    ${habitRows || '<p class="sans" style="color:#8B92A8;">과제가 없습니다.</p>'}
    <p class="sans" style="font-size:13px; color:#EDE7D9; font-style:italic; margin-top:1.2rem; line-height:1.7;">${verdict}</p>
  `;
  document.getElementById("reportModal").style.display = "flex";
}
function closeReport() { document.getElementById("reportModal").style.display = "none"; }

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
</body>
</html>
